name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,noise,kernel]"

      - name: Run extension tests
        run: |
          PYTHONPATH=src pytest -x \
            tests/test_adaptive_boolean.py \
            tests/test_noise_model.py \
            tests/test_k_forrelation.py \
            tests/test_kernel_shadow.py \
            tests/test_non_iid_scaling.py \
            -v --tb=short

      - name: Run full test suite (non-blocking on pyqsp failures)
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short || true
